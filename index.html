<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stan's Portfolio</title>

  <canvas id="c" style="position:fixed;top:0;left:0;z-index:-1;background:#031c15"></canvas>

<script>




const v=c.getContext('2d'),p=[];
const r=()=>{c.width=innerWidth;c.height=innerHeight};
addEventListener('resize',r);r();
for(let i=0;i<100;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:Math.random()-.5,vy:Math.random()-.5});
(function d(){
  v.clearRect(0,0,c.width,c.height);
  v.fillStyle='#9fdbbb';
  p.forEach(i=>{
    i.x=(i.x+i.vx+c.width)%c.width;
    i.y=(i.y+i.vy+c.height)%c.height;
    v.fillRect(i.x,i.y,2,2);
  });
  requestAnimationFrame(d);
})();
</script>
